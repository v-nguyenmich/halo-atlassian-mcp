name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:
    inputs:
      no_cache:
        description: "Disable buildx cache (used by scheduled rebuilds to force fresh base layers)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  lockfile-hashes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
      - name: Verify requirements.lock contains --hash entries
        run: |
          if ! grep -q -- '--hash=sha256:' requirements.lock; then
            echo "::error::requirements.lock must be regenerated with --generate-hashes"
            exit 1
          fi

  test:
    needs: lockfile-hashes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
      - uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f  # v5.1.1
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check src tests
      - run: pytest -q

  build-and-scan:
    needs: test
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/halo-mcp-atlassian
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
      - uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db  # v3.6.1
      - uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567  # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@5cd11c3a4ced054e52742c5fd54dca954e0edd85  # v6.7.0
        with:
          context: .
          push: true
          pull: true
          no-cache: ${{ inputs.no_cache || false }}
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:canary
          provenance: true
          sbom: true

      - name: Trivy scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8  # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Docker Scout (informational; Trivy is the gate)
        uses: docker/scout-action@aceeb83b88f2ae54376891227858dda7af647183  # v1.15.0
        continue-on-error: true
        with:
          command: cves
          image: ${{ env.IMAGE }}:${{ github.sha }}
          only-severities: critical,high
          exit-code: false

      - name: Generate SBOM (syft)
        uses: anchore/sbom-action@61119d458adab75f756bc0b9e4bde25725f86a7a  # v0.17.2
        with:
          image: ${{ env.IMAGE }}:${{ github.sha }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@4959ce089c160fddf62f7b42464195ba1a56d382  # v3.6.0

      - name: Sign image (keyless OIDC)
        run: cosign sign --yes ${{ env.IMAGE }}:${{ github.sha }}

      - name: Attest SBOM
        run: cosign attest --yes --predicate sbom.spdx.json --type spdxjson ${{ env.IMAGE }}:${{ github.sha }}

      - uses: actions/upload-artifact@0b2256b8c012f0828dc542b3febcab082c67f72b  # v4.3.4
        with:
          name: sbom
          path: sbom.spdx.json

      # Promote to :stable only after Trivy passed, image is signed, and SBOM is attested.
      # Consumers who follow :stable (auto-update scheduled task) get only known-good images.
      - name: Promote to :stable
        id: promote
        if: github.event_name == 'push' || github.event_name == 'workflow_call' || github.event_name == 'schedule'
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE }}:stable \
            ${{ env.IMAGE }}:${{ github.sha }}

      # After a successful promotion, open an auto-merging PR that bumps
      # $DefaultImage in the wrapper. Users' weekly update task then picks
      # up the new digest with zero manual steps.
      #
      # Uses WRAPPER_BUMP_PAT (fine-grained PAT with contents:write +
      # pull-requests:write) if available so the bump PR re-triggers CI;
      # falls back to GITHUB_TOKEN otherwise (PR opens but CI won't run on
      # it -- merge manually or push an empty commit).
      - name: Bump wrapper digest PR
        if: steps.promote.conclusion == 'success'
        env:
          IMAGE: ${{ env.IMAGE }}
          NEW_DIGEST: ${{ steps.build.outputs.digest }}
          GIT_REF_SHORT: ${{ github.sha }}
          GH_TOKEN: ${{ secrets.WRAPPER_BUMP_PAT || secrets.GITHUB_TOKEN }}
        run: bash scripts/bump-wrapper-digest.sh
