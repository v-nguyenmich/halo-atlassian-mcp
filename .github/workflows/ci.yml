name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:
    inputs:
      no_cache:
        description: "Disable buildx cache (used by scheduled rebuilds to force fresh base layers)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write
  packages: write
  pull-requests: write

jobs:
  lockfile-hashes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Verify requirements.lock contains --hash entries
        run: |
          if ! grep -q -- '--hash=sha256:' requirements.lock; then
            echo "::error::requirements.lock must be regenerated with --generate-hashes"
            exit 1
          fi

  test:
    needs: lockfile-hashes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check src tests
      - run: pytest -q

  build-and-scan:
    needs: test
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/halo-mcp-atlassian
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          push: true
          pull: true
          no-cache: ${{ inputs.no_cache || false }}
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:canary
          provenance: true
          sbom: true

      - name: Trivy scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Docker Scout (informational; Trivy is the gate)
        uses: docker/scout-action@cd72f264beff1cd72735de31148b9d3244a0234a  # v1.15.0
        continue-on-error: true
        with:
          command: cves
          image: ${{ env.IMAGE }}:${{ github.sha }}
          only-severities: critical,high
          exit-code: false

      - name: Generate SBOM (syft)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          image: ${{ env.IMAGE }}:${{ github.sha }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Sign image (keyless OIDC)
        run: cosign sign --yes ${{ env.IMAGE }}:${{ github.sha }}

      - name: Attest SBOM
        run: cosign attest --yes --predicate sbom.spdx.json --type spdxjson ${{ env.IMAGE }}:${{ github.sha }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom
          path: sbom.spdx.json

      # Promote to :stable only after Trivy passed, image is signed, and SBOM is attested.
      # Consumers who follow :stable (auto-update scheduled task) get only known-good images.
      - name: Promote to :stable
        id: promote
        if: github.event_name == 'push' || github.event_name == 'workflow_call' || github.event_name == 'schedule'
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE }}:stable \
            ${{ env.IMAGE }}:${{ github.sha }}

      # After a successful promotion, open an auto-merging PR that bumps
      # $DefaultImage in the wrapper. Users' weekly update task then picks
      # up the new digest with zero manual steps.
      #
      # Uses WRAPPER_BUMP_PAT (fine-grained PAT with contents:write +
      # pull-requests:write) if available so the bump PR re-triggers CI;
      # falls back to GITHUB_TOKEN otherwise (PR opens but CI won't run on
      # it -- merge manually or push an empty commit).
      - name: Bump wrapper digest PR
        if: steps.promote.conclusion == 'success'
        env:
          IMAGE: ${{ env.IMAGE }}
          NEW_DIGEST: ${{ steps.build.outputs.digest }}
          GIT_REF_SHORT: ${{ github.sha }}
          GH_TOKEN: ${{ secrets.WRAPPER_BUMP_PAT || secrets.GITHUB_TOKEN }}
        run: bash scripts/bump-wrapper-digest.sh
